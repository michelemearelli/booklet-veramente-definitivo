<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Booklet Magazine 3D - Solo Rotazione</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    model-viewer {
      width: 100%;
      height: 600px;  /* regola l'altezza a piacere */
      background-color: transparent;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<model-viewer
    src="bookletmagazine.glb"
    alt="Booklet Magazine 3D"
    auto-rotate
    camera-controls
    disable-zoom
    disable-pan
    interaction-prompt="none"
    shadow-intensity="0"
    exposure="1"
></model-viewer>

</body>
</html>
